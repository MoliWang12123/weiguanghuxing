<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}微光护行{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="brand-mark">✦</span>
      <span>微光护行</span>
    </a>
    <nav class="nav">
      <a href="{{ url_for('index') }}">首页</a>
      <a href="{{ url_for('stories') }}">微光故事</a>
      <a href="{{ url_for('treehole') }}">护士树洞</a>
      <a href="{{ url_for('classroom') }}">生命小课堂</a>
      <a href="{{ url_for('gallery') }}">光影相册</a>
      <a href="{{ url_for('about') }}">关于</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <p>微光护行 · 护理人文与生命治愈网站</p>
    <p>本网站用于课程设计与健康教育展示，不替代专业医疗诊断和治疗建议。</p>
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
